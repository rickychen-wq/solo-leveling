<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Solo Leveling System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #a020f0; --blue: #00d4ff; --bg: #050a12; --panel-border: #1a2a3a; --success: #00ff88; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; color: #fff; font-family: 'Noto Sans TC', sans-serif; position: fixed; }
        .system-panel { position: relative; width: 100vw; height: 100vh; background: var(--bg); overflow: hidden; display: flex; flex-direction: column; }
        .system-panel::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, transparent, var(--purple), transparent, transparent); animation: rotate 3s linear infinite; }
        .system-panel::after { content: ''; position: absolute; inset: 4px; background: var(--bg); border-radius: 15px; z-index: 1; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .wrapper { position: relative; z-index: 10; padding: 15px; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-card { border: 2px solid var(--purple); padding: 30px; background: #050a12; border-radius: 15px; text-align: center; width: 100%; max-width: 320px; box-shadow: 0 0 20px var(--purple); }
        input { background: rgba(255,255,255,0.05); border: 1px solid var(--panel-border); color: #fff; padding: 12px; margin: 10px 0; width: 100%; border-radius: 8px; font-size: 16px; outline: none; }
        .tabs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; margin-bottom: 10px; }
        .tab { padding: 8px 2px; background: rgba(255,255,255,0.05); border: 1px solid var(--panel-border); font-size: 10px; cursor: pointer; text-align: center; border-radius: 4px; color: #888; font-weight: bold; }
        .tab.active { background: var(--purple); color: #fff; border-color: var(--purple); }
        .page { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 80px; -webkit-overflow-scrolling: touch; }
        .page.active { display: flex; }
        .exp-container { width: 100%; height: 18px; background: rgba(0,0,0,0.5); border: 1px solid var(--panel-border); border-radius: 9px; position: relative; overflow: hidden; margin: 10px 0; }
        .exp-bar { height: 100%; background: linear-gradient(90deg, var(--purple), var(--blue)); width: 0%; transition: 0.5s ease; }
        .exp-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-family: 'Orbitron'; font-weight: 900; color: #fff; text-shadow: 1px 1px 2px #000; }
        .btn-main { background: var(--purple); border: none; color: #fff; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%; font-family: 'Orbitron'; margin-top: 10px; box-shadow: 0 4px 0 #6a14a3; }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #6a14a3; }
        .stat-box { background: rgba(255,255,255,0.03); border: 1px solid var(--panel-border); padding: 12px; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .log-item { background: rgba(255,255,255,0.03); border-left: 3px solid var(--blue); padding: 8px; margin-bottom: 6px; border-radius: 4px; font-size: 12px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .level-up { border-left-color: var(--success); background: rgba(0,255,136,0.05); }
    </style>
</head>
<body>
<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--purple); font-family:'Orbitron'; margin:0 0 20px 0; letter-spacing:2px;">SYSTEM LOGIN</h2>
        <input type="text" id="acct" placeholder="ACCOUNT NAME" autocomplete="off">
        <input type="password" id="pass" placeholder="PASSWORD" autocomplete="off">
        <button onclick="handleLogin()" class="btn-main">INITIALIZE</button>
    </div>
</div>
<div class="system-panel">
    <div class="wrapper">
        <div id="ui-rank" style="color:var(--purple); font-weight:900; font-family:'Orbitron'; font-size:0.9rem; letter-spacing:1px;">E-RANK</div>
        <h2 style="margin:2px 0 10px 0; font-size: 1.1rem; font-family:'Orbitron';">HUNTER: <span id="ui-name" style="color:var(--blue);">---</span></h2>
        <div class="tabs">
            <div class="tab active" onclick="showPage('page-main', event)">主畫面</div>
            <div class="tab" onclick="showPage('page-dg-set', event)">地下城</div>
            <div class="tab" onclick="showPage('page-upgrade', event)">能力</div>
            <div class="tab" onclick="showPage('page-inv', event)">背包</div>
            <div class="tab" onclick="showPage('page-logs', event)">紀錄</div>
        </div>
        <div id="page-main" class="page active">
            <div style="text-align: center; margin: 10px 0;">
                <div style="font-size: 0.8rem; color: #888; font-family:'Orbitron';">LEVEL</div>
                <div id="ui-lv" style="font-size: 5.5rem; font-weight: 900; font-family:'Orbitron'; color:var(--purple); line-height:1; text-shadow: 0 0 20px rgba(160,32,240,0.5);">1</div>
            </div>
            <div class="exp-container"><div id="exp-bar" class="exp-bar"></div><div id="exp-text" class="exp-text">0 / 100</div></div>
            <div class="stat-box"><span>智力 (INT)</span><b id="ui-int" style="color:var(--blue);">10</b></div>
            <div class="stat-box"><span>敏捷 (AGI)</span><b id="ui-agi" style="color:var(--blue);">10</b></div>
            <button class="btn-main" onclick="showPage('page-dg-set', event)">進入地下城區塊</button>
        </div>
        <div id="page-dg-set" class="page">
            <div id="dg-list" class="page active">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;" id="subject-grid"></div>
            </div>
        </div>
        <div id="page-upgrade" class="page">
            <div class="stat-box" style="border-color:var(--success); background:rgba(0,255,136,0.05);"><span>可用點數</span><b id="ui-points" style="color:var(--success);">0</b></div>
            <div class="stat-box"><span>智力 (INT)</span><button onclick="addStat('int')" class="tab active" style="width:50px; border:none;">+</button></div>
            <div class="stat-box"><span>敏捷 (AGI)</span><button onclick="addStat('agi')" class="tab active" style="width:50px; border:none;">+</button></div>
        </div>
        <div id="page-inv" class="page"><h3 style="color:var(--purple);">背包</h3><div class="stat-box">尚無道具</div></div>
        <div id="page-logs" class="page"><h3 style="color:var(--success);">最近紀錄</h3><div id="log-list"></div></div>
    </div>
</div>
<script>
    let p = null; let currentUser = "";
    const subjects = { '國文':{'複習講義':350,'閱讀越會':150,'語文練習':150},'數學':{'講義':600},'英文':{'雜誌':100,'單字本':300,'All in One':300,'課本單字':200},'物理':{'講義':300},'地科':{'講義':350},'公民':{'課本':300,'講義':350},'歷史':{'課本':500}};
    
    function handleLogin(){
        const acct = document.getElementById('acct').value.trim().toLowerCase();
        const pass = document.getElementById('pass').value;
        if(!acct) return; currentUser = acct;
        let saved = localStorage.getItem('solo_save_' + acct);
        if(saved){
            p = JSON.parse(saved);
            if(p.pass !== pass) return alert("密碼錯誤，請重新確認！");
            if(!p.logs) p.logs = []; if(!p.points) p.points = 0;
        } else {
            p = {pass:pass, name:acct, lv:1, exp:0, int:10, agi:10, points:0, quests:[], logs:[{date:new Date().toLocaleString(), msg:"系統正式啟動，獵人登錄完成"}]};
        }
        document.getElementById('login-screen').style.display = 'none';
        initDG(); updateUI();
    }

    function initDG(){
        const grid = document.getElementById('subject-grid');
        grid.innerHTML = Object.keys(subjects).map(s => `<button class="btn-main" style="font-size:14px; margin:0;" onclick="handleQuest('${s}')">${s}</button>`).join('');
    }

    function handleQuest(s){
        const sub = subjects[s];
        const task = Object.keys(sub)[0]; 
        const xp = sub[task];
        if(confirm(`確認完成 ${s} 任務嗎？\n獲得獎勵：${xp} XP`)){
            p.exp += xp;
            const t = new Date().toLocaleString();
            p.logs.unshift({date:t, msg:`完成 ${s} 訓練，獲得 ${xp} XP`});
            checkLvUp(); updateUI();
        }
    }

    function checkLvUp(){
        let next = getNextExp(p.lv);
        while(p.exp >= next){
            p.exp -= next; p.lv++; p.points += 3;
            p.logs.unshift({date:new Date().toLocaleString(), msg:`[突破] 升級至 Lv.${p.lv}！獲得 3 點能力值`, special:true});
            next = getNextExp(p.lv);
        }
    }

    function updateUI(){
        const next = getNextExp(p.lv);
        document.getElementById('ui-name').innerText = p.name.toUpperCase();
        document.getElementById('ui-lv').innerText = p.lv;
        document.getElementById('ui-int').innerText = p.int;
        document.getElementById('ui-agi').innerText = p.agi;
        document.getElementById('ui-points').innerText = p.points;
        document.getElementById('ui-rank').innerText = getRank(p.lv);
        document.getElementById('exp-text').innerText = `${p.exp} / ${next} XP`;
        document.getElementById('exp-bar').style.width = (p.exp/next*100) + "%";
        document.getElementById('log-list').innerHTML = p.logs.map(l => `<div class="log-item ${l.special?'level-up':''}"><small style="color:#555;">${l.date}</small><div>${l.msg}</div></div>`).join('');
        localStorage.setItem('solo_save_'+currentUser, JSON.stringify(p));
    }

    function getNextExp(lv){ let b=100; for(let i=1; i<lv; i++) b+=(i<30)?50:100; return b; }
    function getRank(lv){ if(lv>=100) return "NATION-RANK"; if(lv>70) return "S-RANK"; if(lv>=51) return "A-RANK"; if(lv>=36) return "B-RANK"; if(lv>=21) return "C-RANK"; if(lv>=11) return "D-RANK"; return "E-RANK"; }
    function showPage(id, e){ document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); e.currentTarget.classList.add('active'); }
    function addStat(s){ if(p.points > 0){ p[s]++; p.points--; updateUI(); } }
    
    // 雙擊防縮放
    document.addEventListener('touchstart', (e) => { if(e.touches.length > 1) e.preventDefault(); }, {passive: false});
</script>
</body>
</html>
