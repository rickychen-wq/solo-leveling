<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Solo Leveling: Growth System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #a020f0; --blue: #00d4ff; --bg: #050a12; --panel-border: #1a2a3a; --success: #00ff88; }
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Noto Sans TC', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }

        /* --- 紫色流光外框 --- */
        .system-panel {
            position: relative; width: 400px; height: 820px; border-radius: 25px; overflow: hidden; background: var(--bg);
            box-shadow: 0 0 50px rgba(160, 32, 240, 0.3);
        }
        .system-panel::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--purple), transparent, transparent);
            animation: rotate 3s linear infinite;
        }
        .system-panel::after { content: ''; position: absolute; inset: 5px; background: var(--bg); border-radius: 22px; z-index: 1; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .wrapper { position: relative; z-index: 10; padding: 25px; display: flex; flex-direction: column; height: 100%; }

        /* --- 登入介面 --- */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .login-card { border: 2px solid var(--purple); padding: 40px; background: #050a12; border-radius: 15px; text-align: center; box-shadow: 0 0 30px var(--purple); }
        input { background: rgba(255,255,255,0.05); border: 1px solid var(--panel-border); color: #fff; padding: 12px; margin: 10px 0; width: 260px; border-radius: 8px; }

        /* --- 頁面與標籤 --- */
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 15px; }
        .tab { padding: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--panel-border); font-size: 0.65rem; cursor: pointer; text-align: center; border-radius: 5px; color: #888; }
        .tab.active { background: var(--purple); color: #fff; border-color: var(--purple); font-weight: bold; }
        .page { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-right: 5px; }
        .page::-webkit-scrollbar { width: 4px; }
        .page::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }
        .page.active { display: flex; }

        /* --- 進度條 --- */
        .exp-container { width: 100%; height: 24px; background: rgba(0,0,0,0.5); border: 1px solid var(--panel-border); border-radius: 12px; position: relative; overflow: hidden; margin: 20px 0; }
        .exp-bar { height: 100%; background: linear-gradient(90deg, var(--purple), var(--blue)); width: 0%; border-radius: 12px; transition: 1s ease; }
        .exp-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-family: 'Orbitron'; font-weight: 900; }

        /* --- 紀錄頁面樣式 --- */
        .log-item { background: rgba(255,255,255,0.03); border-left: 3px solid var(--blue); padding: 10px; margin-bottom: 8px; border-radius: 4px; font-size: 0.85rem; }
        .log-item.level-up { border-left-color: var(--success); background: rgba(0,255,136,0.05); }
        .log-date { font-size: 0.7rem; color: #555; display: block; margin-bottom: 4px; font-family: 'Orbitron'; }

        /* 其他通用按鈕/方塊 */
        .btn-main { background: var(--purple); border: none; color: #fff; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; transition: 0.3s; font-family: 'Orbitron'; letter-spacing: 1px; }
        .stat-box { background: rgba(255,255,255,0.03); border: 1px solid var(--panel-border); padding: 12px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sub-btn { background: rgba(160, 32, 240, 0.1); border: 1px solid var(--purple); color: #fff; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .sub-detail-page { display: none; position: absolute; inset: 0; background: var(--bg); z-index: 50; padding: 20px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10001; justify-content: center; align-items: center; }
        .modal-content { width: 350px; height: 650px; background: var(--bg); border: 2px solid var(--purple); border-radius: 20px; padding: 25px; position: relative; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--purple); font-family:'Orbitron';">AUTHENTICATION</h2>
        <input type="text" id="acct" placeholder="帳號 / ACCOUNT">
        <input type="password" id="pass" placeholder="密碼 / PASSWORD">
        <button onclick="handleLogin()" class="btn-main" style="margin-top:20px;">SYSTEM START</button>
    </div>
</div>

<div class="system-panel">
    <div class="wrapper">
        <div id="player-header">
            <div id="ui-rank" style="color:var(--purple); font-weight:900; font-family:'Orbitron'; font-size:1.2rem;">E-RANK</div>
            <h1 style="margin:5px 0; font-size: 1.4rem;">HUNTER: <span id="ui-name" style="color:var(--blue); font-family:'Orbitron';">---</span></h1>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showPage('page-main', event)">主畫面</div>
            <div class="tab" onclick="showPage('page-dg-set', event)">地下城設定</div>
            <div class="tab" onclick="showPage('page-upgrade', event)">能力提升</div>
            <div class="tab" onclick="showPage('page-shop', event)">商店</div>
            <div class="tab" onclick="showPage('page-inv', event)">背包</div>
            <div class="tab" onclick="showPage('page-logs', event)" style="color:var(--success);">升級紀錄</div>
        </div>

        <div id="page-main" class="page active">
            <div style="text-align: center; margin-top: 30px;">
                <div style="font-size: 1rem; color:#888; font-family:'Orbitron';">LEVEL</div>
                <div id="ui-lv" style="font-size: 5.5rem; font-weight: 900; font-family:'Orbitron'; color:var(--purple); line-height:1;">1</div>
            </div>
            <div class="exp-container">
                <div id="exp-bar" class="exp-bar"></div>
                <div id="exp-text" class="exp-text">0 / 100</div>
            </div>
            <div class="stat-box"><span>智力 (INT)</span><b id="ui-int">10</b></div>
            <div class="stat-box"><span>敏捷 (AGI)</span><b id="ui-agi">10</b></div>
            <button class="btn-main" style="margin-top: auto;" onclick="openDungeon()">攻略地下城</button>
        </div>

        <div id="page-dg-set" class="page">
            <h3 style="color:var(--purple);">地下城設定</h3>
            <div class="subject-grid">
                <button class="sub-btn" onclick="openSubject('國文')">國文</button>
                <button class="sub-btn" onclick="openSubject('英文')">英文</button>
                <button class="sub-btn" onclick="openSubject('數學')">數學</button>
                <button class="sub-btn" onclick="openSubject('物理')">物理</button>
                <button class="sub-btn" onclick="openSubject('地科')">地科</button>
                <button class="sub-btn" onclick="openSubject('公民')">公民</button>
                <button class="sub-btn" onclick="openSubject('歷史')">歷史</button>
            </div>
            <div id="subject-detail" class="sub-detail-page">
                <span onclick="closeSubject()" style="color:var(--blue); cursor:pointer;">← 返回</span>
                <h2 id="detail-title"></h2>
                <div id="detail-options"></div>
            </div>
        </div>

        <div id="page-upgrade" class="page">
            <h3>提升系統</h3>
            <div class="stat-box" style="border-color:var(--success);"><span>可用點數</span><b id="ui-points" style="color:var(--success);">0</b></div>
            <div class="stat-box"><span>智力</span><button onclick="addStat('int')" style="width:50px;">+</button></div>
            <div class="stat-box"><span>敏捷</span><button onclick="addStat('agi')" style="width:50px;">+</button></div>
        </div>

        <div id="page-shop" class="page"><h3>商店</h3><p>目前沒東西</p></div>
        <div id="page-inv" class="page"><h3>背包</h3><p>目前是空的</p></div>

        <div id="page-logs" class="page">
            <h3 style="color:var(--success);">成長日誌 / LOGS</h3>
            <div id="log-list">
                </div>
        </div>
    </div>
</div>

<div id="dg-modal" class="modal">
    <div class="modal-content">
        <div onclick="closeDungeon()" style="cursor:pointer; color:var(--purple); margin-bottom:20px;">[ 離開地下城 ]</div>
        <div id="quest-list"></div>
    </div>
</div>

<script>
    let p = null;
    let currentUser = "";

    const subjects = {
        '國文': { '複習講義': 350, '閱讀越會': 150, '語文練習': 150, ranges: 'L1-12' },
        '數學': { '講義': 600, ranges: 'L1-10' },
        '英文': { '雜誌': 100, '單字本': 300, 'All in One': 300, '課本單字': 200 },
        '物理': { '講義': 300, ranges: 'L1-10' },
        '地科': { '講義': 350, ranges: 'L1-6' },
        '公民': { '課本': 300, '講義': 350, ranges: 'L1-6' },
        '歷史': { '課本': 500, ranges: 'L1-6' }
    };

    function handleLogin() {
        const acct = document.getElementById('acct').value;
        const pass = document.getElementById('pass').value;
        if(!acct) return;
        currentUser = acct;
        let saved = localStorage.getItem('solo_save_' + acct);
        if(saved) {
            p = JSON.parse(saved);
            if(p.pass !== pass) return alert("密碼錯誤");
        } else {
            p = { pass: pass, name: acct, lv: 1, exp: 0, int: 10, agi: 10, points: 0, quests: [], logs: [] };
            addLog("系統激活：歡迎進入影子系統。");
        }
        document.getElementById('login-screen').style.display = 'none';
        updateUI();
    }

    function addLog(msg, isLevelUp = false) {
        const now = new Date();
        const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
        p.logs.unshift({ date: timeStr, msg: msg, special: isLevelUp });
        if(p.logs.length > 50) p.logs.pop(); // 只留最近50筆
    }

    function updateUI() {
        const next = getNextExp(p.lv);
        document.getElementById('ui-name').innerText = p.name;
        document.getElementById('ui-lv').innerText = p.lv;
        document.getElementById('ui-int').innerText = p.int;
        document.getElementById('ui-agi').innerText = p.agi;
        document.getElementById('ui-points').innerText = p.points;
        document.getElementById('ui-rank').innerText = getRank(p.lv);
        document.getElementById('exp-text').innerText = `${p.exp} / ${next}`;
        document.getElementById('exp-bar').style.width = (p.exp / next * 100) + "%";
        
        // 更新紀錄列表
        const logList = document.getElementById('log-list');
        logList.innerHTML = p.logs.map(l => `
            <div class="log-item ${l.special ? 'level-up' : ''}">
                <span class="log-date">${l.date}</span>
                ${l.msg}
            </div>
        `).join('');
        
        localStorage.setItem('solo_save_' + currentUser, JSON.stringify(p));
    }

    function getNextExp(lv) {
        let base = 100;
        for(let i=1; i<lv; i++) base += (i < 30) ? 50 : 100;
        return base;
    }

    function getRank(lv) {
        if(lv >= 100) return "NATION-RANK";
        if(lv > 70) return "S-RANK";
        if(lv >= 51) return "A-RANK";
        if(lv >= 36) return "B-RANK";
        if(lv >= 21) return "C-RANK";
        if(lv >= 11) return "D-RANK";
        return "E-RANK";
    }

    function openSubject(name) {
        const detail = document.getElementById('subject-detail');
        const options = document.getElementById('detail-options');
        document.getElementById('detail-title').innerText = name;
        options.innerHTML = "";
        Object.keys(subjects[name]).forEach(key => {
            if(key === 'ranges') return;
            const btn = document.createElement('div');
            btn.className = 'stat-box';
            btn.innerHTML = `<span>${key}</span><small>${subjects[name][key]} XP</small>`;
            btn.onclick = () => {
                let unit = prompt("請輸入回數/章節 (例如 L1 或 第1回):");
                if(unit) {
                    p.quests.push({ title: `${name}-${key} [${unit}]`, exp: subjects[name][key] });
                    alert("任務已加入地下城");
                    detail.style.display = 'none';
                    updateUI();
                }
            };
            options.appendChild(btn);
        });
        detail.style.display = 'block';
    }

    function closeSubject() { document.getElementById('subject-detail').style.display = 'none'; }

    function openDungeon() {
        document.getElementById('dg-modal').style.display = 'flex';
        const list = document.getElementById('quest-list');
        list.innerHTML = p.quests.map((q, i) => `
            <div class="stat-box" style="flex-direction:column; align-items:flex-start;">
                <div style="font-weight:bold; color:var(--blue);">${q.title}</div>
                <div style="font-size:0.8rem; margin:5px 0;">獎勵：${q.exp} XP</div>
                <button onclick="finishQuest(${i})" class="btn-main" style="padding:5px;">完成</button>
            </div>
        `).join('') || "<p>目前沒有任務</p>";
    }

    function finishQuest(i) {
        const q = p.quests.splice(i, 1)[0];
        p.exp += q.exp;
        addLog(`完成任務：${q.title}，獲得 ${q.exp} 經驗。`);
        
        let next = getNextExp(p.lv);
        while(p.exp >= next) {
            p.exp -= next;
            p.lv++;
            p.points += 3;
            addLog(`等級突破！升級至 Lv.${p.lv}，獲得 3 點屬性點。`, true);
            next = getNextExp(p.lv);
        }
        updateUI();
        openDungeon();
    }

    function closeDungeon() { document.getElementById('dg-modal').style.display = 'none'; }
    function showPage(id, e) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }
    function addStat(s) { if(p.points > 0) { p[s]++; p.points--; updateUI(); } }
</script>
</body>
</html>
