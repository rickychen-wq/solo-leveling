<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo Leveling: Ultimate System (V8)</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #bc13fe; --purple-dark: #5a0b80; --gold: #ffd700; --blue: #00d4ff; --bg: #030712;
            --s-rank: #ff3e3e; --a-rank: #bc13fe; --b-rank: #00d4ff; --c-rank: #00ff88; --d-rank: #aaaaaa; --e-rank: #555555;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans TC', sans-serif; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; }

        /* 系統外框與紫色流光 */
        .system-frame {
            position: relative; width: 100vw; height: 100vh; max-width: 500px; margin: 0 auto;
            background: var(--bg); overflow: hidden; display: flex; flex-direction: column; z-index: 10;
        }
        @media (min-width: 501px) {
            .system-frame { height: 96vh; margin: 2vh auto; border-radius: 24px; border: 1px solid rgba(188, 19, 254, 0.3); }
        }
        .system-frame::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent 70%, var(--purple) 100%);
            animation: rotateLight 4s linear infinite; z-index: -1;
        }
        @keyframes rotateLight { 100% { transform: rotate(360deg); } }
        
        .inner-content {
            position: absolute; inset: 4px; background: radial-gradient(circle at top, #130a24 0%, var(--bg) 80%);
            border-radius: 20px; z-index: 2; padding: 20px 15px 0 15px; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 主畫面數值框樣式 (強制撐開高度，解決字不見的問題) */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .stat-item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(188, 19, 254, 0.2);
            border-radius: 15px; padding: 15px 10px; text-align: center; position: relative;
            min-height: 90px; display: flex; flex-direction: column; justify-content: center;
        }
        .stat-label { font-size: 11px; color: var(--blue); font-family: 'Orbitron'; font-weight: 900; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-val { font-size: 1.8rem; font-weight: 900; font-family: 'Orbitron'; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

        /* XP 條 - 碎玻璃質感 */
        .xp-bar-container {
            width: 100%; height: 16px; background: rgba(255,255,255,0.05);
            border-radius: 10px; position: relative; overflow: hidden; border: 1px solid rgba(188, 19, 254, 0.4); margin: 15px 0 5px 0;
        }
        .xp-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4a00e0, var(--purple)); transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 0 10px var(--purple); position: relative; overflow: hidden; }
        .xp-bar-fill::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.3) 25%, transparent 30%), linear-gradient(70deg, transparent 60%, rgba(255,255,255,0.4) 65%, transparent 70%);
            background-size: 40px 100%; opacity: 0.8;
        }

        /* 列表區域與導航列 */
        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 30px; padding-right: 5px; }
        .scroll-area::-webkit-scrollbar { width: 3px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--purple-dark); border-radius: 10px; }

        .nav { display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(188, 19, 254, 0.2); background: rgba(0,0,0,0.9); flex-shrink: 0; margin: 0 -15px; }
        .nav-link { color: #555; font-size: 11px; font-weight: 900; cursor: pointer; text-align: center; flex: 1; transition: 0.3s; }
        .nav-link.active { color: var(--purple); text-shadow: 0 0 10px var(--purple); }

        .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .page.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* 卡片與按鈕 */
        .card { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .card.equipped { border: 1px solid var(--purple); background: rgba(188, 19, 254, 0.05); box-shadow: inset 0 0 15px rgba(188, 19, 254, 0.1); }
        .btn-action { background: var(--purple); color: #fff; border: none; padding: 10px 16px; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 13px; font-family: 'Orbitron'; transition: 0.1s; }
        .btn-action:active { transform: scale(0.95); }

        /* 階級顏色 */
        .rank-S { color: var(--s-rank); text-shadow: 0 0 8px var(--s-rank); font-weight: 900; }
        .rank-A { color: var(--a-rank); font-weight: 900; }
        .rank-B { color: var(--b-rank); font-weight: 900; }
        .rank-C { color: var(--c-rank); font-weight: 900; }
        .rank-D { color: var(--d-rank); font-weight: 900; }
        .rank-E { color: var(--e-rank); font-weight: 900; }
        .rank-UNKNOWN { color: #ff0055; text-shadow: 0 0 15px #ff0055, 0 0 30px #ff0055; font-weight: 900; }

        #login-ui { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .login-box { width: 85%; max-width: 400px; padding: 40px; border: 2px solid var(--purple); border-radius: 20px; text-align: center; background: rgba(10, 15, 30, 0.9); box-shadow: 0 0 30px var(--purple-dark); }
        input { width: 100%; padding: 15px; margin: 15px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 10px; text-align: center; font-size: 1.1rem; outline: none; }
        input:focus { border-color: var(--purple); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #0a0f1e; border: 1px solid var(--blue); border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
        
        #gacha-pop { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .gacha-glow { font-size: 2.5rem; font-family: 'Orbitron'; font-weight: 900; padding: 20px; animation: popGlow 1.5s infinite alternate; }
        @keyframes popGlow { from { transform: scale(1); text-shadow: 0 0 10px currentColor; } to { transform: scale(1.05); text-shadow: 0 0 30px currentColor, 0 0 60px currentColor; } }
    </style>
</head>
<body>

<div id="login-ui">
    <div class="login-box">
        <h1 style="font-family:'Orbitron'; color:var(--purple); letter-spacing: 5px; margin-bottom: 30px;">ARISE</h1>
        <input type="text" id="inp-acc" placeholder="HUNTER ID">
        <input type="password" id="inp-pwd" placeholder="ACCESS CODE">
        <button onclick="System.login()" style="width:100%; padding:15px; background:var(--purple); color:#fff; border:none; border-radius:10px; font-weight:900; font-family:'Orbitron'; cursor:pointer; font-size:1.1rem;">INITIALIZE</button>
    </div>
</div>

<div id="gacha-pop" onclick="this.style.display='none'">
    <div style="color:var(--blue); font-family:'Orbitron'; font-size:14px; margin-bottom:10px;">SYSTEM NOTIFICATION</div>
    <div id="gacha-msg" style="color:#fff; font-size:1.2rem; font-weight:900;">恭喜獲得稱號</div>
    <div id="gacha-result" class="gacha-glow">S-RANK</div>
    <div style="margin-top:40px; color:#666; font-size:12px;">TAP ANYWHERE TO CLOSE</div>
</div>

<div id="dungeon-modal" class="modal-overlay">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(0,212,255,0.3); padding-bottom:10px; margin-bottom:15px;">
            <h2 id="dm-title" style="color:var(--blue); font-family:'Orbitron'; margin:0;">SUBJECT</h2>
            <button class="btn-action" style="background:transparent; border:1px solid #555; color:#aaa; padding:5px 10px;" onclick="document.getElementById('dungeon-modal').style.display='none'">返回</button>
        </div>
        <div id="dm-content"></div>
    </div>
</div>

<div class="system-frame">
    <div class="inner-content">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px; flex-shrink:0;">
            <div>
                <div id="ui-name" style="font-family:'Orbitron'; font-weight:900; color:var(--blue); font-size: 1.5rem; text-transform:uppercase;">PLAYER</div>
                <div id="ui-title" style="font-size:12px; color:var(--gold); font-weight: 900; margin-top:2px;">[ 尚未覺醒 ]</div>
            </div>
            <div style="text-align: right;">
                <div id="ui-coins" style="color:var(--gold); font-weight:900; font-size: 1.2rem; font-family: 'Orbitron';">💰 0</div>
                <div id="ui-sp" style="font-size: 11px; color: var(--purple); font-weight: 900; margin-top: 3px;">剩餘點數: 0</div>
            </div>
        </div>

        <div id="p-home" class="page active">
            <div style="text-align:center; margin-top: 10px;">
                <div id="ui-rank" style="font-size:13px; letter-spacing:3px; font-family: 'Orbitron'; font-weight:900; color:#888;">E-RANK HUNTER</div>
                <div id="ui-lv" style="font-size:6.5rem; font-weight:900; color:var(--purple); font-family:'Orbitron'; line-height: 1.1; text-shadow: 0 0 30px rgba(188, 19, 254, 0.6);">1</div>
                
                <div class="xp-bar-container"><div id="ui-xp-fill" class="xp-bar-fill"></div></div>
                <div id="ui-xp-txt" style="font-size:11px; color:#aaa; font-family: 'Orbitron'; font-weight:900;">0 / 100 XP</div>
            </div>

            <div class="stat-grid">
                <div class="stat-item"><div class="stat-label">IQ (智力)</div><div id="v-iq" class="stat-val">1</div></div>
                <div class="stat-item"><div class="stat-label">STR (力量)</div><div id="v-str" class="stat-val">1</div></div>
                <div class="stat-item"><div class="stat-label">MP (魔力)</div><div id="v-mp" class="stat-val">1</div></div>
                <div class="stat-item"><div class="stat-label">DEX (敏捷)</div><div id="v-dex" class="stat-val">1</div></div>
            </div>
            
            <div style="flex:1"></div>
            <button class="btn-action" style="width:100%; padding:20px; background:rgba(0,212,255,0.05); border:1px solid var(--blue); color:var(--blue); border-radius:15px; font-size:1.2rem; letter-spacing: 2px; margin-bottom: 10px;" onclick="System.nav('p-dungeon')">攻略地下城 (ENTER)</button>
        </div>

        <div id="p-dungeon" class="page">
            <h2 style="font-family:'Orbitron'; color:var(--blue); margin: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">DUNGEON GATES</h2>
            <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; margin-bottom:15px; flex-shrink:0;">
                <button class="btn-action" style="background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); color:var(--blue);" onclick="System.openDungeonModal('國文')">國文</button>
                <button class="btn-action" style="background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); color:var(--blue);" onclick="System.openDungeonModal('英文')">英文</button>
                <button class="btn-action" style="background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); color:var(--blue);" onclick="System.openDungeonModal('數學')">數學</button>
                <button class="btn-action" style="background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); color:var(--blue);" onclick="System.openDungeonModal('物理')">物理</button>
                <button class="btn-action" style="background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); color:var(--blue);" onclick="System.openDungeonModal('地科')">地科</button>
                <button class="btn-action" style="background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); color:var(--blue);" onclick="System.openDungeonModal('公民')">公民</button>
                <button class="btn-action" style="background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); color:var(--blue);" onclick="System.openDungeonModal('歷史')">歷史</button>
            </div>
            <h2 style="font-family:'Orbitron'; color:var(--purple); margin: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">ACTIVE QUESTS</h2>
            <div id="active-quests-list" class="scroll-area"></div>
        </div>

        <div id="p-enhance" class="page">
            <h2 style="font-family:'Orbitron'; color:var(--purple); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">STATUS UPGRADE</h2>
            <div style="text-align:center; margin-bottom:20px; font-size:1.1rem; color:var(--purple); font-weight:900;">剩餘自由配點: <span id="up-sp-display" style="font-family:'Orbitron'; font-size:1.6rem; color:#fff;">0</span></div>
            <div id="upgrade-list" class="scroll-area"></div>
        </div>

        <div id="p-titles" class="page">
            <h2 style="color:var(--gold); font-family:'Orbitron'; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px;">TITLES COLLECTION</h2>
            <div id="titles-list" class="scroll-area"></div>
        </div>

        <div id="p-store" class="page">
            <h2 style="font-family:'Orbitron'; color:var(--blue); border-bottom: 1px solid rgba(0,212,255,0.3); padding-bottom: 10px;">DAILY SHOP <span id="shop-time" style="font-size:10px; color:#555; float:right; line-height:2.5;"></span></h2>
            <div style="display:flex; gap:10px; margin-bottom:15px; flex-shrink:0;">
                <button class="btn-action" id="tab-sword" style="flex:1" onclick="System.renderShop('sword')">武器庫</button>
                <button class="btn-action" id="tab-potion" style="flex:1; background:#222; color:#888;" onclick="System.renderShop('potion')">藥水</button>
                <button class="btn-action" id="tab-mat" style="flex:1; background:#222; color:#888;" onclick="System.renderShop('mat')">材料</button>
                <button class="btn-action" id="tab-title" style="flex:1; background:#222; color:#888;" onclick="System.renderShop('title')">稱號卷軸</button>
            </div>
            <div id="store-list" class="scroll-area"></div>
        </div>

        <div id="p-inventory" class="page">
            <h2 style="color:var(--blue); font-family:'Orbitron'; border-bottom: 1px solid rgba(0,212,255,0.3); padding-bottom: 10px;">INVENTORY</h2>
            <div id="bag-list" class="scroll-area"></div>
        </div>

        <div class="nav">
            <div class="nav-link active" onclick="System.nav('p-home', event)">主畫面</div>
            <div class="nav-link" onclick="System.nav('p-dungeon', event)">地下城</div>
            <div class="nav-link" onclick="System.nav('p-enhance', event)">提升</div>
            <div class="nav-link" onclick="System.nav('p-titles', event)">稱號</div>
            <div class="nav-link" onclick="System.nav('p-store', event)">商店</div>
            <div class="nav-link" onclick="System.nav('p-inventory', event)">背包</div>
        </div>
    </div>
</div>

        B: ["鋼鐵重刃", "影殺短刀", "獵人彎刀", "符文長劍", "烈焰直劍", "毒牙匕首", "騎士團佩劍", "破甲刺劍", "巨浪斬馬刀", "守望者長槍", "精準獵刀", "閃爍之刃", "荒野戰斧", "密林獵手", "沉重鐵鎚"],
        C: ["老練長劍", "士兵佩刀", "強化鐵劍", "寬刃大刀", "輕量化匕首", "巡邏隊長之劍", "護衛手杖", "鋒利切肉刀", "雙手巨劍", "練習用長刀", "鐵製短劍", "守城衛士槍", "野外求生刀", "礦工十字鎬", "粗製大劍"],
        D: ["生鏽鐵片", "磨損的砍刀", "舊式刺刀", "木柄短劍", "歪斜的匕首", "鈍掉的菜刀", "破損長槍", "重鑄的廢鐵", "路邊的小刀", "脆弱的竹劍", "農用鐮刀", "缺口的佩刀", "簡易長矛", "粗糙的斧頭", "採集用小鏟"],
        E: ["傳說中的木棒", "削鉛筆刀", "斷掉的樹枝", "生鏽的圖釘", "破爛的鍋鏟", "紙紮的劍", "髒掉的抹布", "塑膠玩具刀", "爛掉的傘骨", "沒水的原子筆", "湯勺", "雞毛撣子", "缺了一角的小石塊", "過期的法棍麵包", "只有柄的劍"]
    },
    subjects: {
        '國文': { items: {'複習講義':350, '閱讀越會':150, '語文練習':150}, range: 12 },
        '英文': { items: {'雜誌':100, '單字本':300, 'All in One':300, '課本單字':200}, range: 10 },
        '數學': { items: {'講義':600}, range: 10 },
        '物理': { items: {'講義':300}, range: 10 },
        '地科': { items: {'講義':350}, range: 6 },
        '公民': { items: {'課本':300, '講義':350}, range: 6 },
        '歷史': { items: {'課本':500}, range: 6 }
    }
};

/* =========================================
   核心系統邏輯
========================================= */
const System = {
    p: null, 
    shopCache: null,
    rankWeight: { 'UNKNOWN': 7, 'S': 6, 'A': 5, 'B': 4, 'C': 3, 'D': 2, 'E': 1 },

    login() {
        const acc = document.getElementById('inp-acc').value.trim() || "HUNTER";
        const pwd = document.getElementById('inp-pwd').value;
        const key = `sl_v8_user_${acc}`; // 強制更新快取 KEY
        
        let saved;
        try { saved = localStorage.getItem(key); } catch(e) {}
        
        if(saved) {
            this.p = JSON.parse(saved);
            // 兼容舊存檔防呆
            if(!this.p.bag) this.p.bag = { swords: [], potions: [], mats: [] };
            if(!this.p.activeQuests) this.p.activeQuests = [];
            if(!this.p.titles) this.p.titles = ["尚未覺醒"];
            if(!this.p.iq) { this.p.iq=1; this.p.str=1; this.p.mp=1; this.p.dex=1; }
        } else {
            this.p = {
                acc, pwd, lv: 1, exp: 0, coins: 0, sp: 0,
                iq: 1, str: 1, mp: 1, dex: 1,
                titles: ["尚未覺醒"], curTitle: "尚未覺醒",
                bag: { swords: [], potions: [], mats: [] },
                activeQuests: []
            };
        }
        document.getElementById('login-ui').style.display = 'none';
        this.checkShopRefresh();
        this.updateUI();
    },

    save() { 
        if(!this.p) return;
        try { localStorage.setItem(`sl_v8_user_${this.p.acc}`, JSON.stringify(this.p)); } catch(e){} 
    },

    nav(id, e) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(e) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            e.target.classList.add('active');
        }
        if(id === 'p-dungeon') this.renderQuests();
        if(id === 'p-enhance') this.renderUpgrades();
        if(id === 'p-titles') this.renderTitles();
        if(id === 'p-shop') this.renderShop('sword');
        if(id === 'p-inventory') this.renderBag();
    },

    /* -- 等級與經驗計算 -- */
    getMaxExp(lv) {
        if (lv <= 30) return 100 + (lv - 1) * 50;
        return 100 + 29 * 50 + (lv - 30) * 100;
    },

    getRank(lv) {
        if(lv >= 100) return { r: "國家級獵人", c: "rank-UNKNOWN" };
        if(lv >= 71) return { r: "S-RANK HUNTER", c: "rank-S" };
        if(lv >= 51) return { r: "A-RANK HUNTER", c: "rank-A" };
        if(lv >= 36) return { r: "B-RANK HUNTER", c: "rank-B" };
        if(lv >= 21) return { r: "C-RANK HUNTER", c: "rank-C" };
        if(lv >= 11) return { r: "D-RANK HUNTER", c: "rank-D" };
        return { r: "E-RANK HUNTER", c: "rank-E" };
    },

    updateUI() {
        if(!this.p) return;
        document.getElementById('ui-name').innerText = this.p.acc;
        document.getElementById('ui-lv').innerText = this.p.lv;
        document.getElementById('ui-coins').innerText = `💰 ${this.p.coins.toLocaleString()}`;
        document.getElementById('ui-sp').innerText = `剩餘點數: ${this.p.sp}`;
        document.getElementById('ui-title').innerText = this.p.curTitle ? `[ ${this.p.curTitle} ]` : "[ 尚未覺醒 ]";
        
        const rankInfo = this.getRank(this.p.lv);
        const rankEl = document.getElementById('ui-rank');
        rankEl.innerText = rankInfo.r; rankEl.className = rankInfo.c;

        const maxExp = this.getMaxExp(this.p.lv);
        document.getElementById('ui-xp-fill').style.width = `${Math.min((this.p.exp / maxExp) * 100, 100)}%`;
        document.getElementById('ui-xp-txt').innerText = `${this.p.exp} / ${maxExp} XP`;

        ['iq', 'str', 'mp', 'dex'].forEach(k => {
            const el = document.getElementById(`v-${k}`);
            if(el) el.innerText = this.p[k];
        });
        this.save();
    },

    addExp(amount) {
        this.p.exp += amount;
        this.p.coins += amount; // 1 XP = 1 蓮幣
        this.checkLevelUp();
        this.updateUI();
    },

    checkLevelUp() {
        let max = this.getMaxExp(this.p.lv);
        if (this.p.exp >= max) {
            this.p.exp -= max;
            this.p.lv++;
            this.p.sp += 3;
            this.p.iq++; this.p.str++; this.p.mp++; this.p.dex++;
            
            // 50級內每升2級抽卡
            if (this.p.lv <= 50 && this.p.lv % 2 === 0) this.drawTitle();
            
            if(this.p.exp >= this.getMaxExp(this.p.lv)) {
                setTimeout(() => this.checkLevelUp(), 10);
            }
        }
    },

    /* -- 抽獎系統 -- */
    drawTitle() {
        const r = Math.random() * 100;
        let rank = 'E'; if(r<0.5) rank='S'; else if(r<2.0) rank='A'; else if(r<20.0) rank='B'; else if(r<40.0) rank='C'; else if(r<65.0) rank='D';
        const t = DB.titles[rank][Math.floor(Math.random() * DB.titles[rank].length)];
        
        if (!this.p.titles.includes(t)) {
            this.p.titles.push(t);
            document.getElementById('gacha-msg').innerText = "系統覺醒：恭喜獲得稱號";
        } else {
            this.p.coins += 500;
            document.getElementById('gacha-msg').innerText = "獲得重複稱號 (已轉化為 500 蓮幣)";
        }
        const resEl = document.getElementById('gacha-result');
        resEl.innerText = t; resEl.className = `gacha-glow rank-${rank}`;
        document.getElementById('gacha-pop').style.display = 'flex';
        this.updateUI();
    },

    /* -- 地下城系統 -- */
    openDungeonModal(sub) {
        const data = DB.subjects[sub];
        document.getElementById('dm-title').innerText = `${sub} 攻略設定`;
        let html = "";
        
        Object.entries(data.items).forEach(([task, xp]) => {
            html += `<div class="card" style="flex-direction:column; align-items:flex-start; background:rgba(0,212,255,0.05); border-color:rgba(0,212,255,0.2);">
                        <div style="width:100%; display:flex; justify-content:space-between; margin-bottom:10px;">
                            <strong style="font-size:1.1rem; color:#fff;">${task}</strong>
                            <span style="color:var(--purple); font-weight:900;">${xp} XP</span>
                        </div>
                        <div style="width:100%; display:flex; gap:10px;">`;
            
            if(task === '單字本') {
                html += `<input type="number" id="inp-t-${task}" placeholder="輸入回數" style="flex:1; padding:8px; background:#000; border:1px solid #444; color:#fff; border-radius:5px; outline:none;">`;
            } else {
                let range = (task === '雜誌') ? 12 : data.range;
                let prefix = (task === '雜誌') ? 'U' : 'L';
                html += `<select id="sel-t-${task}" style="flex:1; padding:8px; background:#000; border:1px solid #444; color:#fff; border-radius:5px; outline:none;">`;
                for(let i=1; i<=range; i++) html += `<option value="${prefix}${i}">${prefix}${i}</option>`;
                html += `</select>`;
            }
            html += `<button class="btn-action" style="background:var(--blue); color:#000;" onclick="System.acceptQuest('${sub}', '${task}', ${xp})">接取</button>
                     </div></div>`;
        });
        document.getElementById('dm-content').innerHTML = html;
        document.getElementById('dungeon-modal').style.display = 'flex';
    },

    acceptQuest(sub, task, xp) {
        let rangeVal = "";
        if(task === '單字本') {
            const el = document.getElementById(`inp-t-${task}`);
            if(!el.value) return alert('請輸入第幾回');
            rangeVal = `第 ${el.value} 回`;
        } else {
            rangeVal = document.getElementById(`sel-t-${task}`).value;
        }
        
        this.p.activeQuests.push({ id: Date.now(), sub, task, range: rangeVal, xp });
        this.save();
        document.getElementById('dungeon-modal').style.display = 'none';
        this.renderQuests();
    },

    renderQuests() {
        let html = "";
        if(this.p.activeQuests.length === 0) html = `<div style="text-align:center; color:#555; padding:20px; font-family:'Orbitron';">NO ACTIVE QUESTS</div>`;
        this.p.activeQuests.forEach(q => {
            html += `<div class="card" style="border-left: 4px solid var(--blue);">
                        <div class="card-col">
                            <strong style="font-size:1.1rem; color:#fff;">${q.sub} - ${q.task}</strong>
                            <span style="color:#888; font-size:11px; margin-top:3px;">範圍: ${q.range} | 獎勵: ${q.xp} XP</span>
                        </div>
                        <button class="btn-action" style="background:#00ff88; color:#000;" onclick="System.completeQuest(${q.id}, ${q.xp})">結算</button>
                     </div>`;
        });
        document.getElementById('active-quests-list').innerHTML = html;
    },

    completeQuest(id, xp) {
        this.p.activeQuests = this.p.activeQuests.filter(q => q.id !== id);
        this.addExp(xp);
        this.renderQuests();
    },

    /* -- 提升配點系統 -- */
    renderUpgrades() {
        document.getElementById('up-sp-display').innerText = this.p.sp;
        const stats = [{ id: 'iq', n: '智商 (IQ)' }, { id: 'str', n: '體力 (STR)' }, { id: 'mp', n: '魔力 (MP)' }, { id: 'dex', n: '準確度 (DEX)' }];
        let html = "";
        stats.forEach(s => {
            html += `<div class="card">
                        <div class="card-col">
                            <strong style="color:var(--blue); font-size:1.1rem;">${s.n}</strong>
                            <span style="color:#fff; font-size:1.8rem; font-family:'Orbitron'; font-weight:900; margin-top:5px;">${this.p[s.id]}</span>
                        </div>
                        <button class="btn-action" style="font-size:1.5rem; padding:10px 25px;" onclick="System.addStat('${s.id}')">+</button>
                     </div>`;
        });
        document.getElementById('upgrade-list').innerHTML = html;
    },

    addStat(id) {
        if(this.p.sp > 0) {
            this.p[id]++;
            this.p.sp--;
            this.updateUI();
            this.renderUpgrades();
        } else alert('配點不足，請攻略地下城升級');
    },

    /* -- 稱號圖鑑切換系統 -- */
    renderTitles() {
        let html = "";
        ['S','A','B','C','D','E'].forEach(r => {
            html += `<div class="section-title rank-${r}">${r}-RANK</div>`;
            DB.titles[r].forEach(t => {
                const unlocked = this.p.titles.includes(t);
                const isEq = this.p.curTitle === t;
                if(unlocked) {
                    html += `<div class="card ${isEq ? 'equipped' : ''}" style="cursor:pointer;" onclick="System.equip('${t}')">
                                <div class="card-col">
                                    <strong class="rank-${r}" style="font-size:1.1rem;">${t}</strong>
                                    <span style="font-size:10px; color:#aaa; margin-top:5px;">${isEq ? '✨ 當前裝備中' : '點擊切換裝備'}</span>
                                </div>
                                ${isEq ? '<span style="color:var(--purple); font-weight:900; font-family:\'Orbitron\';">EQUIPPED</span>' : ''}
                             </div>`;
                } else {
                    html += `<div class="card locked-title"><strong class="rank-E">${r==='S'?'???':t}</strong><span style="font-size:10px;">未解鎖</span></div>`;
                }
            });
        });
        document.getElementById('titles-list').innerHTML = html;
    },

    equip(t) {
        this.p.curTitle = t;
        this.updateUI();
        this.renderTitles();
    },

    /* -- 商店系統防呆與渲染 -- */
    checkShopRefresh() {
        const today = new Date().toLocaleDateString();
        let stored;
        try { stored = localStorage.getItem('sl_shop_v8'); } catch(e){}
        if(stored) {
            const parsed = JSON.parse(stored);
            if(parsed.date === today) {
                this.shopCache = parsed.data;
                document.getElementById('shop-time').innerText = `Refreshed: ${today}`;
                return;
            }
        }
        this.refreshShop(today);
    },

    getWearRate(rank) {
        const r = Math.random();
        if(rank === 'S') return (0.500 + r * 4.500).toFixed(3);
        if(rank === 'A') return (5.000 + r * 10.000).toFixed(3);
        if(rank === 'B') return (20.000 + r * 5.000).toFixed(3);
        if(rank === 'C') return (30.000 + r * 10.000).toFixed(3);
        if(rank === 'D') return (45.000 + r * 10.000).toFixed(3);
        return (70.000 + r * 20.000).toFixed(3);
    },

    refreshShop(today) {
        let shop = { swords: [], titles: [] };
        
        Object.keys(DB.swords).forEach(rank => {
            DB.swords[rank].forEach(sw => {
                let name = typeof sw === 'object' ? sw.name : sw;
                let desc = typeof sw === 'object' ? sw.desc : '';
                let wear = rank === 'UNKNOWN' ? '???' : this.getWearRate(rank);
                let price = rank === 'UNKNOWN' ? 999999 : (rank==='S'?50000:rank==='A'?20000:rank==='B'?5000:rank==='C'?2500:rank==='D'?1500:50);
                shop.swords.push({ name, rank, wear, desc, price });
            });
        });
        shop.swords.sort((a,b) => this.rankWeight[b.rank] - this.rankWeight[a.rank]);

        for(let i=0; i<12; i++) {
            const r = Math.random() * 100;
            let rank = 'E'; if(r<1.5) rank='S'; else if(r<5) rank='A'; else if(r<25) rank='B'; else if(r<45) rank='C'; else if(r<65) rank='D';
            let name = DB.titles[rank][Math.floor(Math.random() * DB.titles[rank].length)];
            let price = rank==='S'?50000 : rank==='A'?25000 : rank==='B'?10000 : rank==='C'?5000 : rank==='D'?2000 : 100;
            shop.titles.push({ name, rank, price });
        }
        shop.titles.sort((a,b) => this.rankWeight[b.rank] - this.rankWeight[a.rank]);

        this.shopCache = shop;
        try { localStorage.setItem('sl_shop_v8', JSON.stringify({ date: today, data: this.shopCache })); } catch(e){}
        document.getElementById('shop-time').innerText = `Refreshed: ${today}`;
    },

    renderShop(tab) {
        ['sword','potion','mat','title'].forEach(t => {
            const btn = document.getElementById(`tab-${t}`);
            if(btn) {
                btn.style.background = t === tab ? 'var(--purple)' : '#222';
                btn.style.color = t === tab ? '#fff' : '#888';
            }
        });

        let html = "";
        try {
            if(!this.shopCache) this.refreshShop(new Date().toLocaleDateString());

            if(tab === 'sword') {
                this.shopCache.swords.forEach((sw, idx) => {
                    let spec = sw.rank === 'UNKNOWN' ? 'border:1px solid #ff0055; background:linear-gradient(45deg,#220011,#000); box-shadow:0 0 15px rgba(255,0,85,0.3);' : (sw.rank === 'S' ? 'border:1px solid var(--gold); box-shadow:inset 0 0 15px rgba(255,215,0,0.1);' : '');
                    html += `<div class="card" style="${spec}">
                                <div class="card-col">
                                    <strong class="rank-${sw.rank}" style="font-size:1.1rem;">${sw.name}</strong>
                                    ${sw.desc ? `<span style="font-size:10px; color:var(--gold); margin-top:3px;">${sw.desc}</span>` : ''}
                                    <span style="color:#888; font-size:10px; margin-top:5px;">磨損度: ${sw.wear}%</span>
                                </div>
                                <button class="btn-action" onclick="System.buyShop('sword', ${idx})">💰 ${sw.price.toLocaleString()}</button>
                             </div>`;
                });
            } else if(tab === 'title') {
                this.shopCache.titles.forEach((t, idx) => {
                    const owned = this.p.titles.includes(t.name);
                    html += `<div class="card">
                                <div class="card-col">
                                    <strong class="rank-${t.rank}" style="font-size:1.1rem;">${t.name}</strong>
                                    <span style="color:#888; font-size:10px; margin-top:5px;">${t.rank}-RANK TITLE</span>
                                </div>
                                <button class="btn-action" ${owned?'style="background:#333;color:#666;" disabled':''} onclick="System.buyShop('title', ${idx})">
                                    ${owned ? '已解鎖' : '💰 ' + t.price.toLocaleString()}
                                </button>
                             </div>`;
                });
            } else {
                html = `<div style="text-align:center; padding:50px; color:#555; font-family:'Orbitron';">STORE RESTOCKING...</div>`;
            }
        } catch(e) {
            html = `<div style="text-align:center; padding:50px; color:red;">讀取商店資料時發生錯誤，請重新載入網頁。</div>`;
        }
        document.getElementById('store-list').innerHTML = html;
    },

    buyShop(type, idx) {
        const item = this.shopCache[`${type}s`][idx];
        if(this.p.coins >= item.price) {
            this.p.coins -= item.price;
            if(type === 'title') {
                this.p.titles.push(item.name);
                alert(`成功解鎖稱號: ${item.name}`);
            } else {
                this.p.bag.swords.push(item);
                alert(`獲得裝備: ${item.name}`);
            }
            this.updateUI();
            this.renderShop(type);
        } else alert('蓮幣餘額不足！');
    },

    /* -- 背包系統 -- */
    renderBag() {
        let html = `<div class="section-title">🗡️ 武器庫</div>`;
        if(this.p.bag.swords.length === 0) html += `<div style="text-align:center; color:#555; padding:15px; border:1px dashed #333; border-radius:10px;">(尚未獲得任何武器)</div>`;
        this.p.bag.swords.forEach(sw => {
            let spec = sw.rank === 'UNKNOWN' ? 'border:1px solid #ff0055;' : (sw.rank === 'S' ? 'border:1px solid var(--gold);' : '');
            html += `<div class="card" style="${spec}">
                        <div class="card-col">
                            <strong class="rank-${sw.rank}" style="font-size:1.1rem;">${sw.name}</strong>
                            ${sw.desc ? `<span style="font-size:10px; color:var(--gold); margin-top:3px;">${sw.desc}</span>` : ''}
                            <span style="font-size:10px; color:#aaa; margin-top:3px;">磨損: ${sw.wear}%</span>
                        </div>
                        <span style="color:#555; font-size:10px;">[ ${sw.rank} ]</span>
                     </div>`;
        });
        
        html += `<div class="section-title" style="color:var(--c-rank); margin-top:20px;">🧪 消耗品與藥水</div><div style="text-align:center; color:#555; padding:15px; border:1px dashed #333; border-radius:10px;">(空)</div>`;
        html += `<div class="section-title" style="color:var(--gold); margin-top:20px;">💎 稀有材料</div><div style="text-align:center; color:#555; padding:15px; border:1px dashed #333; border-radius:10px;">(空)</div>`;
        document.getElementById('bag-list').innerHTML = html;
    }
};

window.System = System;

window.onload = () => {
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
};
</script>
</body>
